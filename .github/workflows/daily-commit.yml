name: Daily Green Commit

on:
  schedule:
    - cron: "30 18 * * *"  # Runs at 12:00 AM IST (18:30 UTC) every day
  workflow_dispatch:        # Allow manual trigger too

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.email "anishtiwari2315@gmail.com"
          git config --global user.name "anishtiwari2315-art"

      - name: Make daily commit
        run: |
          echo "Last auto-commit: $(date '+%Y-%m-%d %H:%M:%S IST')" > activity.md
          git add activity.md
          git commit -m "chore: daily activity update - $(date '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
